name: Build & Deploy

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'build.py'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: python build.py

      - name: Commit built files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Sashiko — Pattern Library.htm" index.html
          git diff --cached --quiet || git commit -m "build: update from src/"
          git push
