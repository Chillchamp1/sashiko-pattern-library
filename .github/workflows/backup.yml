name: Backup Firestore patterns

on:
  schedule:
    # 03:17 UTC on the 1st of every month (odd minute to avoid the top-of-hour cron rush)
    - cron: '17 3 1 * *'
  workflow_dispatch: {}   # manual "Run workflow" button in the Actions tab

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch patterns + comments from Firestore
        run: node tools/backup/backup-firestore.js

      - name: Commit backup (only if something changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backup
          git diff --cached --quiet || git commit -m "backup: Firestore patterns $(date -u +%Y-%m-%d)"
          git push
